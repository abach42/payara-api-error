services:
  payara-test:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "4848:4848"
    volumes:
      - ./post-boot-commands.asadmin:/opt/payara/config/boot-commands.asadmin
    environment:
      PAYARA_LOG_TO_CONSOLE: "true"
      POSTBOOT_COMMANDS: /opt/payara/config/post-boot-commands.asadmin